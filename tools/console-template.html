<style>/* =========================================================
   ST Licensor Console — Analytics
   Dark (Black / Deep Navy) theme system
   ========================================================= */

:root {
  /* Surfaces */
  --bg:        #080b12;
  --bg-grad:   radial-gradient(1200px 600px at 80% -10%, #11213b 0%, #0a0f1a 45%, #080b12 100%);
  --panel:     #0f1623;
  --panel-2:   #131c2c;
  --panel-3:   #18222f;
  --panel-hi:  #1b2536;
  --sidebar:   #06080d;

  /* Lines */
  --border:    rgba(148,163,184,0.12);
  --border-2:  rgba(148,163,184,0.20);
  --border-3:  rgba(148,163,184,0.32);

  /* Text */
  --ink:    #eef2fa;
  --ink-2:  #9aa6bd;
  --ink-3:  #66708a;
  --ink-4:  #454f66;

  /* Brand + semantic */
  --accent:    #4f8ff7;
  --accent-2:  #38bdf8;
  --accent-dim:rgba(79,143,247,0.14);
  --green:  #34d399;
  --green-dim: rgba(52,211,153,0.14);
  --amber:  #fbbf24;
  --amber-dim: rgba(251,191,36,0.14);
  --red:    #f87171;
  --red-dim:   rgba(248,113,113,0.14);
  --violet: #a78bfa;
  --violet-dim:rgba(167,139,250,0.14);
  --cyan:   #22d3ee;

  /* Chart series (adapted to dark) */
  --c-actual: #5b9bff;
  --c-plan:   #76839c;
  --c-prior:  #3c465c;
  --c-prior2: #424c61;

  --radius:    14px;
  --radius-sm: 10px;
  --radius-xs: 8px;

  --shadow:    0 1px 2px rgba(0,0,0,0.4), 0 12px 32px rgba(0,0,0,0.28);
  --shadow-lg: 0 24px 64px rgba(0,0,0,0.5);

  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  --sidebar-w: 232px;
  --filter-h:  60px;
  --topbar-h:  58px;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
body { background: var(--bg-grad); background-attachment: fixed; min-height: 100vh; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; }
::selection { background: rgba(79,143,247,0.32); }

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #1f2a3c; border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: #2a3850; background-clip: padding-box; }

/* ---------- App layout ---------- */
.app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }

/* ---------- Sidebar ---------- */
.sidebar {
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
}
.brand {
  height: var(--topbar-h);
  display: flex; align-items: center; gap: 11px;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
}
.brand .mark {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, #1d2b46, #0c1422);
  border: 1px solid var(--border-2);
  display: inline-flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 12px; font-style: italic; letter-spacing: -0.03em;
  color: #fff;
}
.brand .bt { line-height: 1.15; }
.brand .bt b { font-size: 12.5px; font-weight: 700; letter-spacing: 0.01em; }
.brand .bt small { display: block; font-size: 9.5px; color: var(--ink-3); letter-spacing: 0.14em; margin-top: 1px; }

.nav { padding: 14px 12px; display: flex; flex-direction: column; gap: 2px; flex: 1; }
.nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: var(--ink-4); padding: 14px 12px 6px; text-transform: uppercase; }
.nav-item {
  display: flex; align-items: center; gap: 11px;
  padding: 9px 12px; border-radius: 9px;

}
.nav-item:hover { background: rgba(148,163,184,0.06); color: var(--ink); }
.nav-item.active { background: linear-gradient(90deg, rgba(79,143,247,0.16), rgba(79,143,247,0.04)); color: #fff; }
.nav-item.active::before {
  content: ""; position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px;
  background: var(--accent); border-radius: 0 3px 3px 0;
}
.nav-item .ic { width: 17px; height: 17px; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 17px; color: currentColor; }
.nav-item .tag { margin-left: auto; font-size: 9.5px; font-weight: 700; font-family: var(--mono); color: var(--ink-3); }
.nav-item.active .tag { color: var(--accent-2); }

.side-foot { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.side-foot .av { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg,#3b5a8f,#243a5e); display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; }
.side-foot .who { line-height: 1.2; }
.side-foot .who b { font-size: 12px; font-weight: 600; }
.side-foot .who small { display: block; font-size: 10px; color: var(--ink-3); }

/* ---------- Main column ---------- */
.main-col { display: flex; flex-direction: column; min-width: 0; }

/* Top bar */
.topbar {
  height: var(--topbar-h);
  display: flex; align-items: center; gap: 16px;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  background: #0a0e17;
  position: sticky; top: 0; z-index: 30;
}
.topbar .tt { display: flex; flex-direction: column; }
.topbar .tt b { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
.topbar .tt small { font-size: 11px; color: var(--ink-3); }
.topbar .spacer { flex: 1; }

/* ---------- Global filter bar ---------- */
.filterbar {
  height: var(--filter-h);
  display: flex; align-items: center; gap: 14px;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  background: #0c111c;
  position: sticky; top: var(--topbar-h); z-index: 29;
  overflow: visible;
}
.filterbar::-webkit-scrollbar { display: none; }
.filter-group { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
.filterbar .seg { flex: 0 0 auto; }
.filter-lab { font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em; color: var(--ink-3); text-transform: uppercase; }

/* Mutually-exclusive axis dimming */
.filter-group.axis-dim .seg,
.filter-group.axis-dim .seg-year,
.filter-group.axis-dim .dd-trigger { opacity: .4; transition: opacity .15s; }
.filter-group.axis-dim:hover .seg,
.filter-group.axis-dim:hover .seg-year,
.filter-group.axis-dim:hover .dd-trigger { opacity: .72; }
.axis-note { font-size: 10px; color: var(--ink-3); font-family: var(--mono); white-space: nowrap; margin-left: 2px; letter-spacing: 0.02em; }
.seg-year { background: var(--panel-2); border: 1px solid var(--border-2); border-radius: 8px; padding: 7px 11px; color: var(--ink); font-family: inherit; cursor: pointer; }
.seg-year:hover { border-color: var(--border-3); background: var(--panel-3); }
.seg-year b { font-size: 13px; font-weight: 700; }
.flag-anon { background: repeating-linear-gradient(45deg, #6b7686, #6b7686 3px, #545d6e 3px, #545d6e 6px) !important; }

/* Compact filter dropdown */
.dd { position: relative; }
.dd-trigger { display: inline-flex; align-items: center; gap: 10px; justify-content: space-between; background: var(--panel-2); border: 1px solid var(--border-2); border-radius: 9px; padding: 7px 11px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--ink); min-width: 78px; }
.dd-trigger:hover { border-color: var(--border-3); background: var(--panel-3); }
.dd-trigger .chev { color: var(--ink-3); display: inline-flex; transition: transform .15s; }
.dd.open .dd-trigger .chev { transform: rotate(180deg); }
.dd-menu { position: absolute; top: calc(100% + 6px); left: 0; min-width: 168px; background: var(--panel-2); border: 1px solid var(--border-2); border-radius: 10px; box-shadow: var(--shadow-lg); padding: 5px; z-index: 60; display: none; }
.dd.open .dd-menu { display: block; }
.dd-opt { padding: 8px 10px; border-radius: 7px; cursor: pointer; font-size: 13px; color: var(--ink-2); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.dd-opt:hover { background: rgba(148,163,184,0.08); color: var(--ink); }
.dd-opt.active { background: var(--accent-dim); color: var(--ink); font-weight: 600; }
.dd-opt.active::after { content: '✓'; color: var(--accent-2); font-size: 11px; }
.dd-hdr { padding: 8px 10px 4px; font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-4); }
.dd-hdr:not(:first-child) { border-top: 1px solid var(--border); margin-top: 4px; }

/* Quick Mix / drill-through */
.qmix { cursor: pointer; transition: transform .14s, border-color .14s, box-shadow .14s; }
.qmix:hover { transform: translateY(-2px); border-color: var(--border-3); box-shadow: var(--shadow-lg); }
.hl-flash { animation: hlflash 1.7s ease; }
@keyframes hlflash { 0%,100% { box-shadow: var(--shadow); } 12%,60% { box-shadow: 0 0 0 3px var(--accent), var(--shadow-lg); } }

/* Licensee selector (dropdown) */
.lic-select {
  position: relative;
}
.lic-trigger {
  display: flex; align-items: center; gap: 10px;
  background: var(--panel-2);
  border: 1px solid var(--border-2);
  border-radius: 10px;
  padding: 7px 12px;
  cursor: pointer;
  min-width: 220px;
  transition: border-color .14s, background .14s;
}
.lic-trigger:hover { border-color: var(--border-3); background: var(--panel-3); }
.lic-trigger .flag { width: 20px; height: 14px; border-radius: 3px; flex: 0 0 20px; border: 1px solid rgba(0,0,0,0.3); }
.lic-trigger .lt { line-height: 1.15; flex: 1; }
.lic-trigger .lt b { font-size: 13px; font-weight: 600; }
.lic-trigger .lt small { display: block; font-size: 10px; color: var(--ink-3); }
.lic-trigger .chev { color: var(--ink-3); transition: transform .18s; }
.lic-select.open .chev { transform: rotate(180deg); }

.lic-menu {
  position: absolute; top: calc(100% + 6px); left: 0;
  width: 280px;
  background: var(--panel-2);
  border: 1px solid var(--border-2);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  padding: 6px;
  z-index: 60;
  display: none;
}
.lic-select.open .lic-menu { display: block; }
.lic-opt {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: 8px; cursor: pointer;
}
.lic-opt:hover { background: rgba(148,163,184,0.08); }
.lic-opt.active { background: var(--accent-dim); }
.lic-opt .flag { width: 22px; height: 15px; border-radius: 3px; flex: 0 0 22px; border: 1px solid rgba(0,0,0,0.3); }
.lic-opt .lt b { font-size: 13px; font-weight: 600; }
.lic-opt .lt small { display: block; font-size: 10.5px; color: var(--ink-3); }
.lic-opt .check { margin-left: auto; color: var(--accent-2); opacity: 0; }
.lic-opt.active .check { opacity: 1; }
.lic-opt.total { border-bottom: 1px solid var(--border); margin-bottom: 4px; padding-bottom: 12px; }

/* Segmented period control */
.seg { display: inline-flex; background: var(--panel-2); border: 1px solid var(--border-2); border-radius: 10px; padding: 3px; gap: 2px; }
.seg button {
  border: none; background: transparent; color: var(--ink-2);
  font-size: 12.5px; font-weight: 600; padding: 6px 14px; border-radius: 7px;
  cursor: pointer; transition: background .14s, color .14s; font-family: inherit;
}
.seg button:hover { color: var(--ink); }
.seg button.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(79,143,247,0.4); }

/* Flags */
.flag-uk { background: linear-gradient(180deg,#012169 33%,#fff 33%,#fff 66%,#c8102e 66%); }
.flag-fr { background: linear-gradient(90deg,#002395 33%,#fff 33%,#fff 66%,#ed2939 66%); }
.flag-it { background: linear-gradient(90deg,#009246 33%,#fff 33%,#fff 66%,#ce2b37 66%); }
.flag-de { background: linear-gradient(180deg,#000 33%,#dd0000 33%,#dd0000 66%,#ffce00 66%); }
.flag-eu { background: radial-gradient(circle, #ffcc00 0 2px, transparent 2px), #003399; }

/* ---------- Main content ---------- */
.main { padding: 26px 28px 64px; flex: 1; min-width: 0; }
.page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 22px; position: relative; z-index: 1; }
.page-head h1 { font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.02em; color: var(--ink); }
.page-head .sub { color: var(--ink-2); font-size: 13px; margin-top: 5px; }
.head-actions { display: flex; gap: 8px; align-items: center; }

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 13px; border-radius: 9px;
  font-size: 12.5px; font-weight: 600; cursor: pointer;
  border: 1px solid transparent; white-space: nowrap;
  transition: background .14s, border-color .14s, color .14s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #3f7fe6; }
.btn-ghost { background: var(--panel-2); color: var(--ink); border-color: var(--border-2); }
.btn-ghost:hover { background: var(--panel-3); border-color: var(--border-3); }
.btn-sm { padding: 6px 10px; font-size: 11.5px; }

/* ---------- Cards ---------- */
.card {
  background: linear-gradient(180deg, var(--panel-2), var(--panel));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.card-pad { padding: 20px 22px; }
.card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
.card-head h3 { font-size: 14px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
.card-head .sub { font-size: 11.5px; color: var(--ink-3); margin-top: 3px; }

/* KPI card */
.kpi {
  padding: 18px 20px;
  display: flex; flex-direction: column; gap: 10px;
  position: relative; overflow: hidden;
}
.kpi .klabel { font-size: 11px; font-weight: 600; color: var(--ink-2); letter-spacing: 0.04em; text-transform: uppercase; display: flex; align-items: center; gap: 7px; }
.kpi .kval { font-size: 27px; font-weight: 700; letter-spacing: -0.02em; font-feature-settings: "tnum"; line-height: 1; }
.kpi .kval small { font-size: 14px; color: var(--ink-2); font-weight: 600; }
.kpi .kcur { font-size: 11px; color: var(--ink-3); font-family: var(--mono); }
.kpi .kfoot { display: flex; align-items: center; gap: 10px; margin-top: auto; }
.kpi .kicon { position: absolute; right: 16px; top: 16px; color: var(--ink-4); opacity: .5; }

.delta { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 700; font-family: var(--mono); }
.delta.up { color: var(--green); }
.delta.down { color: var(--red); }

.pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px; border-radius: 999px; font-size: 10.5px; font-weight: 700; letter-spacing: 0.02em; }

.pill-amber { background: var(--amber-dim); color: var(--amber); }
.pill-red { background: var(--red-dim); color: var(--red); }
.pill-violet { background: var(--violet-dim); color: var(--violet); }
.pill-gray { background: rgba(148,163,184,0.1); color: var(--ink-2); }

/* Tabs */
.tabs { display: inline-flex; gap: 2px; background: var(--panel); border: 1px solid var(--border); border-radius: 9px; padding: 3px; }
.tabs button { border: none; background: transparent; color: var(--ink-2); font-size: 12px; font-weight: 600; padding: 6px 13px; border-radius: 6px; cursor: pointer; font-family: inherit; }
.tabs button:hover { color: var(--ink); }
.tabs button.active { background: var(--panel-hi); color: var(--ink); }

/* Sub-tree (A2 left nav) */
.subtree { display: flex; flex-direction: column; gap: 3px; }
.subtree .st-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 9px; font-size: 13px; color: var(--ink-2); cursor: pointer; font-weight: 500; }
.subtree .st-item:hover { background: rgba(148,163,184,0.06); color: var(--ink); }
.subtree .st-item.active { background: var(--accent-dim); color: #fff; font-weight: 600; }
.subtree .st-item .ic { width: 15px; height: 15px; flex: 0 0 15px; }
.subtree .st-item .num { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--ink-3); }

/* Generic grids */
.grid { display: grid; gap: 16px; }
.g-4 { grid-template-columns: repeat(4, 1fr); }
.g-3 { grid-template-columns: repeat(3, 1fr); }
.g-2 { grid-template-columns: repeat(2, 1fr); }

/* Chart container */
.chart { width: 100%; }

.tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.tbl th { text-align: left; font-size: 10px; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; padding: 9px 12px; border-bottom: 1px solid var(--border); }

.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: rgba(148,163,184,0.03); }

/* Number with hover-source affordance */
.src-num { border-bottom: 1px dotted var(--border-3); cursor: help; }

/* Custom tooltip */
.cc-tip {
  position: fixed; z-index: 200;
  background: #060910; border: 1px solid var(--border-2);
  border-radius: 10px; padding: 11px 13px;
  box-shadow: var(--shadow-lg);
  font-size: 11.5px; max-width: 280px;
  pointer-events: none; opacity: 0; transform: translateY(4px);
  transition: opacity .12s, transform .12s;
}

.cc-tip .tt-h { font-weight: 700; font-size: 12px; margin-bottom: 6px; color: #fff; display: flex; align-items: center; gap: 6px; }
.cc-tip .tt-row { display: flex; justify-content: space-between; gap: 18px; padding: 2px 0; color: var(--ink-2); }
.cc-tip .tt-row b { color: var(--ink); font-family: var(--mono); }
.cc-tip .tt-src { margin-top: 7px; padding-top: 7px; border-top: 1px solid var(--border); color: var(--ink-3); font-size: 10.5px; }

/* Hero domain card (A1) */
.hero {
  padding: 22px;
  cursor: pointer;
  position: relative;
  transition: border-color .16s, transform .16s, box-shadow .16s;
  overflow: hidden;
}
.hero::after {
  content: ""; position: absolute; inset: 0; border-radius: var(--radius);
  background: radial-gradient(420px 160px at 100% 0%, var(--glow, rgba(79,143,247,0.10)), transparent 70%);
  pointer-events: none;
}
.hero:hover { border-color: var(--border-3); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.hero .h-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.hero .h-ic { width: 38px; height: 38px; border-radius: 11px; display: inline-flex; align-items: center; justify-content: center; }
.hero .h-name { font-size: 13px; font-weight: 600; color: var(--ink-2); }
.hero .h-val { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; font-feature-settings: "tnum"; }
.hero .h-cur { font-size: 11px; color: var(--ink-3); font-family: var(--mono); margin-top: 3px; }

.hero .h-metric .ml { font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.05em; }
.hero .h-metric .mv { font-size: 14px; font-weight: 700; font-family: var(--mono); margin-top: 3px; }
.hero .h-arrow { color: var(--ink-3); transition: transform .16s, color .16s; }
.hero:hover .h-arrow { color: var(--accent-2); transform: translateX(3px); }

/* Action Required box (A1) */
.action-box {
  padding: 16px 18px;
  display: flex; flex-direction: column; gap: 12px;
  border-left: 3px solid var(--border-2);
}
.action-box.urgent { border-left-color: var(--red); }
.action-box.warn { border-left-color: var(--amber); }
.action-box.ok { border-left-color: var(--green); }
.action-box .ab-head { display: flex; align-items: center; gap: 10px; }
.action-box .ab-flag { width: 22px; height: 15px; border-radius: 3px; flex: 0 0 22px; border: 1px solid rgba(0,0,0,0.3); }
.action-box .ab-name { font-size: 13.5px; font-weight: 700; }
.action-box .ab-headline { font-size: 11.5px; color: var(--ink-2); }
.action-box .ab-count { margin-left: auto; }
.action-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; background: rgba(148,163,184,0.04); font-size: 12px; }
.action-item .ai-ic { width: 24px; height: 24px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 24px; }
.action-item .ai-txt { flex: 1; min-width: 0; }
.action-item .ai-txt b { font-weight: 600; }
.action-item .ai-due { font-family: var(--mono); font-size: 10.5px; font-weight: 700; white-space: nowrap; }

/* Legend (chart) */
.legend { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.legend .lg { display: inline-flex; align-items: center; gap: 7px; font-size: 11.5px; color: var(--ink-2); }
.legend .lg .ln { width: 16px; height: 0; border-top-width: 2px; border-top-style: solid; }
.legend .lg .sw { width: 11px; height: 11px; border-radius: 3px; }

/* Heatmap cells fallback */
.hm-grid { display: grid; gap: 4px; }
.hm-cell { aspect-ratio: 1.6/1; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; font-family: var(--mono); cursor: default; }

/* Divider */
hr.div { border: none; border-top: 1px solid var(--border); margin: 0; }

/* Mini bar (used in lists) */
.minibar { height: 5px; border-radius: 999px; background: rgba(148,163,184,0.12); overflow: hidden; }
.minibar > i { display: block; height: 100%; border-radius: 999px; }

/* Currency triple */
.cur3 { font-family: var(--mono); font-size: 11px; color: var(--ink-3); }
.cur3 b { color: var(--ink-2); font-weight: 600; }

/* utility */
.muted { color: var(--ink-3); }
.mono { font-family: var(--mono); }
.flex { display: flex; }
.between { display: flex; align-items: center; justify-content: space-between; }
.center { display: flex; align-items: center; }
.gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; }
.mt-8 { margin-top: 8px; } .mt-16 { margin-top: 16px; } .mt-24 { margin-top: 24px; }
.wrap { flex-wrap: wrap; }

@media (max-width: 1320px) {
  .g-4 { grid-template-columns: repeat(2, 1fr); }
}

/* =========================================================
   Mode toggle / new Overview components
   ========================================================= */
.mode-toggle { display:inline-flex; background:var(--panel-2); border:1px solid var(--border-2); border-radius:10px; padding:3px; gap:2px; }
.mode-toggle button { border:none; background:transparent; color:var(--ink-2); font-size:12.5px; font-weight:600; padding:7px 13px; border-radius:7px; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; gap:7px; white-space:nowrap; }
.mode-toggle button:hover { color:var(--ink); }
.mode-toggle button.active { background:var(--accent); color:#fff; box-shadow:0 2px 8px rgba(37,99,235,0.35); }
.mode-toggle button .ic { width:14px; height:14px; display:inline-flex; }

/* 8 headline KPI tiles (compact) */
.kpi-mini { padding:14px 15px; gap:7px; min-height:96px; }
.kpi-mini .klabel { font-size:9.5px; letter-spacing:0.05em; }
.kpi-mini .kval { font-size:20px; }
.kpi-mini .kval small { font-size:12px; }
.kpi-mini .ksub { font-size:10.5px; color:var(--ink-3); font-family:var(--mono); }
.kpi-grid-8 { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
@media (max-width: 1320px) { .kpi-grid-8 { grid-template-columns:repeat(3,1fr); } }
@media (max-width: 980px) { .kpi-grid-8 { grid-template-columns:repeat(2,1fr); } }

/* Peer benchmark badge */
.peer-badge { display:inline-flex; align-items:center; gap:5px; font-size:10px; font-weight:700; padding:3px 8px; border-radius:999px; background:rgba(148,163,184,0.12); color:var(--ink-2); font-family:var(--mono); }
.peer-badge.pos { color:var(--green); background:var(--green-dim); }
.peer-badge.neg { color:var(--red); background:var(--red-dim); }

/* Rankings */
.rank-row { display:grid; grid-template-columns:18px 132px 1fr 96px; gap:14px; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
.rank-row:last-child { border-bottom:none; }
.rank-row .rk { font-family:var(--mono); font-size:12px; font-weight:700; color:var(--ink-3); text-align:center; }
.rank-row .rname { display:flex; align-items:center; gap:9px; font-size:13px; font-weight:600; }
.rank-row .rname .flag { width:20px; height:14px; border-radius:3px; flex:0 0 20px; border:1px solid rgba(0,0,0,0.25); }
.rank-row .rval { font-family:var(--mono); font-size:13px; font-weight:700; text-align:right; }

/* KPI tone accents */
.kpi .kval.tone-green { color:var(--green); }
.kpi .kval.tone-amber { color:var(--amber); }
.kpi .kval.tone-red { color:var(--red); }

/* Section heading (overview) */
.ov-sec { display:flex; align-items:flex-end; justify-content:space-between; margin:28px 0 12px; }
.ov-sec h2 { font-size:16px; font-weight:700; margin:0; letter-spacing:-0.01em; }
.ov-sec .ov-sub { font-size:12px; color:var(--ink-3); margin-top:3px; }
