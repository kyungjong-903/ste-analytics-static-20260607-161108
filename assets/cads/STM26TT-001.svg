<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg" style="background:#fafafa">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e5e7eb" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#grid)"/>
  <text x="30" y="40" font-family="JetBrains Mono, monospace" font-size="11" fill="#6b7280" letter-spacing="2">STM26TT-001 · Mens Track Top Premium · v3</text>
  <rect x="540" y="20" width="40" height="24" rx="4" fill="#1f2937"/><text x="560" y="36" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">B</text>
  
  <!-- oversized shoulders + body -->
  <path d="M 200 200
           L 140 230 L 130 280
           L 150 290 L 175 280
           L 175 580 L 425 580
           L 425 280 L 450 290
           L 470 280 L 460 230
           L 400 200
           L 380 180 L 220 180 Z"
        fill="#1f2937" stroke="#0f172a" stroke-width="2"/>
  <!-- neck -->
  <ellipse cx="300" cy="195" rx="40" ry="14" fill="#0f172a"/>
  <!-- sleeves (oversized drop) -->
  <path d="M 140 230 L 100 380 L 150 410 L 175 320 Z" fill="#1f2937" stroke="#0f172a" stroke-width="2"/>
  <path d="M 460 230 L 500 380 L 450 410 L 425 320 Z" fill="#1f2937" stroke="#0f172a" stroke-width="2"/>
  <!-- VIOLATION: neon green vertical stripe down body -->
  <rect x="290" y="200" width="20" height="380" fill="#84CC16"/>
  <!-- zip -->
  <line x1="300" y1="200" x2="300" y2="580" stroke="#374151" stroke-width="1" stroke-dasharray="2,3"/>
  <!-- bottom hem -->
  <rect x="175" y="565" width="250" height="20" fill="#0f172a"/>

  <circle cx="480" cy="700" r="9" fill="#1F2937" stroke="#374151" stroke-width="0.5"/><circle cx="480" cy="722" r="9" fill="#84CC16" stroke="#374151" stroke-width="0.5"/>
  <text x="30" y="780" font-family="JetBrains Mono, monospace" font-size="9" fill="#9ca3af">CAD · v3 · SS26</text>
</svg>