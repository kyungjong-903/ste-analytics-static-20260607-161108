<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg" style="background:#fafafa">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e5e7eb" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#grid)"/>
  <text x="30" y="40" font-family="JetBrains Mono, monospace" font-size="11" fill="#6b7280" letter-spacing="2">STM26TP-003 · Wide Track Pant · v1</text>
  <rect x="540" y="20" width="40" height="24" rx="4" fill="#1f2937"/><text x="560" y="36" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">A</text>
  
  <!-- waistband -->
  <rect x="200" y="180" width="200" height="40" rx="6" fill="#374151" stroke="#1f2937" stroke-width="1.5"/>
  <!-- left leg -->
  <path d="M 200 220 L 195 580 L 175 720 L 270 720 L 295 580 L 295 220 Z" fill="#3F3F46" stroke="#1f2937" stroke-width="2"/>
  <!-- right leg -->
  <path d="M 305 220 L 305 580 L 330 720 L 425 720 L 405 580 L 400 220 Z" fill="#3F3F46" stroke="#1f2937" stroke-width="2"/>
  <!-- Damarindo side stripes (signature) -->
  <line x1="195" y1="240" x2="180" y2="700" stroke="#E5E7EB" stroke-width="4"/>
  <line x1="405" y1="240" x2="420" y2="700" stroke="#E5E7EB" stroke-width="4"/>
  <line x1="205" y1="240" x2="190" y2="700" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="395" y1="240" x2="410" y2="700" stroke="#9CA3AF" stroke-width="1.5"/>
  <!-- waist drawstring -->
  <line x1="280" y1="200" x2="320" y2="200" stroke="#1f2937" stroke-width="1.5"/>
  <circle cx="275" cy="200" r="3" fill="#1f2937"/>
  <circle cx="325" cy="200" r="3" fill="#1f2937"/>

  <circle cx="480" cy="700" r="9" fill="#3F3F46" stroke="#374151" stroke-width="0.5"/><circle cx="480" cy="722" r="9" fill="#E5E7EB" stroke="#374151" stroke-width="0.5"/>
  <text x="30" y="780" font-family="JetBrains Mono, monospace" font-size="9" fill="#9ca3af">CAD · v3 · SS26</text>
</svg>